<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#534AB7">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<title>错题集</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --primary: #534AB7;
  --primary-light: #EEEDFE;
  --primary-mid: #7F77DD;
  --success: #0F6E56;
  --success-light: #E1F5EE;
  --danger: #A32D2D;
  --danger-light: #FCEBEB;
  --warning: #BA7517;
  --warning-light: #FAEEDA;
  --gray-light: #F1EFE8;
  --text: #2C2C2A;
  --text-muted: #5F5E5A;
  --border: rgba(0,0,0,0.12);
  --bg: #f5f4f0;
  --card-bg: #ffffff;
  --radius: 14px;
  --radius-sm: 8px;
}
html { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100%; font-size: 14px; line-height: 1.6;
  overflow-x: hidden;
}
/* ─── Header ─── */
.app-header {
  background: var(--primary); color: white;
  padding: 16px 20px 12px;
  padding-top: calc(16px + env(safe-area-inset-top, 0px));
  position: -webkit-sticky; position: sticky; top: 0; z-index: 100;
}
.app-header h1 { font-size: 18px; font-weight: 500; letter-spacing: 0.5px; }
.app-header p { font-size: 12px; opacity: 0.8; margin-top: 2px; }
/* ─── Nav tabs ─── */
.nav-tabs {
  display: flex; background: var(--card-bg);
  border-bottom: 1px solid var(--border);
  position: -webkit-sticky; position: sticky;
  top: var(--header-h, 62px); z-index: 99;
}
.nav-tab {
  flex: 1; padding: 12px 8px; text-align: center; font-size: 13px;
  border: none; background: none; cursor: pointer; color: var(--text-muted);
  border-bottom: 2px solid transparent;
  -webkit-appearance: none; appearance: none; touch-action: manipulation;
}
.nav-tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 500; }
/* ─── Pages ─── */
.page { display: none; padding: 16px; padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px)); }
.page.active { display: block; }
/* ─── Stats ─── */
.stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }
.stat-card { background: var(--card-bg); border-radius: var(--radius-sm); padding: 14px 16px; border: 1px solid var(--border); }
.stat-label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
.stat-value { font-size: 26px; font-weight: 500; }
.stat-value.purple { color: var(--primary); }
.stat-value.green { color: var(--success); }
.stat-value.orange { color: var(--warning); }
.stat-value.red { color: var(--danger); }
/* ─── Filter bar ─── */
.filter-bar {
  display: flex; gap: 8px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  padding-bottom: 4px; margin-bottom: 14px; scrollbar-width: none;
}
.filter-bar::-webkit-scrollbar { display: none; }
.filter-chip {
  white-space: nowrap; padding: 5px 12px; border-radius: 20px;
  border: 1px solid var(--border); background: var(--card-bg);
  font-size: 12px; cursor: pointer; color: var(--text-muted);
  -webkit-appearance: none; appearance: none; touch-action: manipulation;
  flex-shrink: 0;
}
.filter-chip.active { background: var(--primary-light); color: var(--primary); border-color: var(--primary-mid); }
/* ─── Card ─── */
.wq-card { background: var(--card-bg); border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 12px; overflow: hidden; }
.wq-card-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-bottom: 1px solid var(--border); background: var(--gray-light); }
.subject-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; flex-shrink: 0; }
.wq-date { font-size: 11px; color: var(--text-muted); margin-left: auto; flex-shrink: 0; }
.correct-counter { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); display: inline-block; }
.dot.filled { background: var(--success); }
.mastered-badge {
  font-size: 10px; padding: 2px 6px; border-radius: 8px;
  background: var(--success-light); color: var(--success);
  font-weight: 500; flex-shrink: 0;
}
.wq-card.mastered { border-color: var(--success); border-width: 1.5px; }
.wq-card.mastered .wq-card-header { background: var(--success-light); }
.wq-card-body { padding: 12px 14px; }
.wq-desc { font-size: 13px; color: var(--text); margin-bottom: 8px; line-height: 1.5; word-break: break-word; }
.wq-img-wrap { border-radius: var(--radius-sm); overflow: hidden; margin-bottom: 8px; }
.wq-img { width: 100%; max-height: 200px; object-fit: contain; background: #f8f8f8; display: block; cursor: pointer; -webkit-user-select: none; user-select: none; }
.wq-note { font-size: 12px; color: var(--text-muted); background: var(--warning-light); padding: 6px 10px; border-radius: var(--radius-sm); margin-bottom: 8px; word-break: break-word; }
.wq-card-footer { display: flex; gap: 8px; padding: 10px 14px; border-top: 1px solid var(--border); flex-wrap: wrap; align-items: center; }
/* ─── Buttons ─── */
.btn {
  padding: 7px 14px; border-radius: var(--radius-sm); font-size: 12px;
  border: 1px solid var(--border); background: var(--card-bg); cursor: pointer;
  font-family: inherit; color: var(--text);
  -webkit-appearance: none; appearance: none; touch-action: manipulation;
  transition: opacity 0.1s; flex-shrink: 0;
}
.btn:active { opacity: 0.6; }
.btn-primary { background: var(--primary); color: white; border-color: var(--primary); }
.btn-success { background: var(--success-light); color: var(--success); border-color: var(--success); }
.btn-sm { padding: 6px 10px; font-size: 11px; min-height: 32px; }
/* ─── Form ─── */
.add-form { background: var(--card-bg); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; }
.form-group { margin-bottom: 14px; }
.form-label { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; display: block; font-weight: 500; }
.form-input {
  width: 100%; padding: 10px 12px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); font-size: 16px;
  font-family: inherit; background: var(--bg); color: var(--text);
  outline: none; -webkit-appearance: none; appearance: none;
}
.form-input:focus { border-color: var(--primary-mid); background: white; }
textarea.form-input { resize: none; min-height: 80px; font-size: 15px; }
.select-wrap { position: relative; }
.select-wrap::after {
  content: '\25BE'; position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  pointer-events: none; color: var(--text-muted); font-size: 13px;
}
select.form-input { padding-right: 28px; }
/* ─── Upload area ─── */
.upload-area {
  border: 2px dashed var(--border); border-radius: var(--radius-sm);
  padding: 24px 16px; text-align: center; background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
}
.upload-btns { display: flex; gap: 10px; margin-top: 6px; justify-content: center; }
.upload-btn {
  padding: 8px 16px; border-radius: var(--radius-sm);
  border: 1px solid var(--primary-mid); color: var(--primary); background: var(--primary-light);
  font-size: 12px; cursor: pointer; font-family: inherit;
  -webkit-appearance: none; appearance: none; touch-action: manipulation;
  position: relative; overflow: hidden; display: inline-block;
}
.upload-btn input[type=file] {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  opacity: 0; width: 100%; height: 100%;
  cursor: pointer; font-size: 0;
}
.upload-icon { font-size: 28px; }
.upload-hint { font-size: 12px; color: var(--text-muted); }
.preview-img-wrap { position: relative; display: inline-block; margin-top: 10px; }
.preview-img { max-width: 100%; max-height: 180px; border-radius: var(--radius-sm); display: block; }
.remove-img {
  position: absolute; top: -8px; right: -8px; width: 24px; height: 24px;
  border-radius: 50%; background: var(--danger); color: white; font-size: 14px;
  border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
  touch-action: manipulation; -webkit-appearance: none; appearance: none;
}
/* ─── Chart ─── */
.subject-chart { margin-top: 4px; }
.chart-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.chart-label { font-size: 12px; color: var(--text-muted); width: 40px; text-align: right; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.chart-bar-bg { flex: 1; background: var(--gray-light); border-radius: 4px; height: 10px; overflow: hidden; }
.chart-bar-fill { height: 100%; border-radius: 4px; background: var(--primary); transition: width 0.5s; min-width: 2px; }
.chart-pct { font-size: 11px; color: var(--text-muted); width: 56px; text-align: right; flex-shrink: 0; }
/* ─── Empty state ─── */
.empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-title { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
.empty-hint { font-size: 13px; }
/* ─── Toast ─── */
.toast {
  position: fixed; top: 60px; left: 50%;
  transform: translateX(-50%) translateY(-10px);
  background: rgba(30,30,30,0.92); color: white; padding: 10px 18px;
  border-radius: 20px; font-size: 13px; opacity: 0; transition: all 0.3s; z-index: 9999;
  pointer-events: none; max-width: calc(100vw - 40px); text-align: center;
  /* 长文本换行 */
  white-space: pre-wrap; word-break: break-word;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
/* ─── Modal ─── */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0; /* Bug#9: 兼容旧版 Android，不用 inset */
  background: rgba(0,0,0,0.5); z-index: 200;
  display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.25s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal-sheet {
  background: var(--card-bg); border-radius: 20px 20px 0 0;
  padding: 20px; padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px));
  width: 100%; max-width: 500px; max-height: 85vh;
  overflow-y: auto; -webkit-overflow-scrolling: touch;
  transform: translateY(40px); transition: transform 0.3s;
}
.modal-overlay.open .modal-sheet { transform: translateY(0); }
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.modal-title { font-size: 16px; font-weight: 500; flex: 1; padding-right: 8px; }
.modal-close {
  border: none; background: none; font-size: 22px; color: var(--text-muted);
  cursor: pointer; padding: 4px 8px; flex-shrink: 0;
  -webkit-appearance: none; appearance: none; touch-action: manipulation;
}
/* ─── Misc ─── */
.section-title { font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 10px; letter-spacing: 0.5px; }
.removed-banner { text-align: center; padding: 8px 10px; background: var(--success-light); font-size: 13px; color: var(--success); border-radius: var(--radius-sm); margin-top: 14px; }
#storage-warn {
  background: var(--warning-light); border: 1px solid var(--warning);
  border-radius: var(--radius-sm); padding: 10px 14px; margin-bottom: 12px;
  font-size: 12px; color: var(--warning); display: none;
}
</style>
</head>
<body>

<div class="app-header" id="app-header">
  <h1>📚 错题集</h1>
  <p id="header-sub">加油，攻克每一道难题！</p>
  <div id="pwa-url-bar" style="display:none;margin-top:6px;font-size:10px;opacity:0.7;word-break:break-all;line-height:1.3;">
    🔗 当前地址：<span id="pwa-url-text"></span>
    <br>如更换链接，请在Safari中打开新地址后重新「添加到主屏幕」
  </div>
</div>

<div class="nav-tabs" id="nav-tabs">
  <button class="nav-tab active" onclick="switchTab('list')">错题列表</button>
  <button class="nav-tab" onclick="switchTab('add')">添加错题</button>
  <button class="nav-tab" onclick="switchTab('stats')">学习统计</button>
</div>

<!-- 错题列表页 -->
<div class="page active" id="page-list">
  <div class="filter-bar" id="filter-bar"></div>
  <div id="wq-list"></div>
</div>

<!-- 添加错题页 -->
<div class="page" id="page-add">
  <div id="storage-warn">⚠️ 存储空间不足，请减少图片或删除已攻克的题目</div>
  <div class="add-form">
    <div class="form-group">
      <label class="form-label" for="input-subject">科目</label>
      <div class="select-wrap">
        <select class="form-input" id="input-subject">
          <option value="语文">语文</option>
          <option value="数学" selected>数学</option>
          <option value="英语">英语</option>
          <option value="物理">物理</option>
          <option value="化学">化学</option>
          <option value="生物">生物</option>
          <option value="历史">历史</option>
          <option value="地理">地理</option>
          <option value="政治">政治</option>
          <option value="其他">其他</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label" for="input-desc">题目描述（可选）</label>
      <textarea class="form-input" id="input-desc" placeholder="简要描述题目内容或考察知识点..." rows="3"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label" for="input-note">错误分析 / 笔记（可选）</label>
      <textarea class="form-input" id="input-note" placeholder="记录错误原因、正确解法..." rows="3"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">拍照 / 上传图片</label>
      <div class="upload-area" id="upload-area">
        <div class="upload-icon">📷</div>
        <div class="upload-hint">选择下方按钮添加图片</div>
        <div class="upload-btns">
          <label class="upload-btn">
            📸 拍照
            <!-- Bug#7修复：先读文件，再重置input。用独立变量保证顺序 -->
            <input type="file" accept="image/*" capture="environment" id="file-camera" onchange="handleImage(event)">
          </label>
          <label class="upload-btn">
            🖼️ 相册
            <input type="file" accept="image/*" id="file-gallery" onchange="handleImage(event)">
          </label>
        </div>
      </div>
      <div id="img-preview-wrap" style="display:none; margin-top:12px; text-align:center;">
        <div class="preview-img-wrap">
          <img class="preview-img" id="img-preview" src="" alt="">
          <button class="remove-img" onclick="removeImage()" aria-label="移除图片">✕</button>
        </div>
      </div>
    </div>
    <button class="btn btn-primary" style="width:100%; padding:14px; font-size:15px;" onclick="saveQuestion()">保存错题</button>
  </div>
</div>

<!-- 统计页 -->
<div class="page" id="page-stats">
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">当前错题数</div><div class="stat-value purple" id="stat-active">0</div></div>
    <div class="stat-card"><div class="stat-label">已攻克题目</div><div class="stat-value green" id="stat-solved">0</div></div>
    <div class="stat-card"><div class="stat-label">累计添加</div><div class="stat-value orange" id="stat-total">0</div></div>
    <div class="stat-card"><div class="stat-label">整体攻克率</div><div class="stat-value red" id="stat-rate">0%</div></div>
  </div>
  <div class="section-title">各科目错题分布</div>
  <div class="add-form" style="margin-bottom:14px;">
    <div id="subject-chart" class="subject-chart"><div style="text-align:center;padding:20px 0;font-size:13px;color:var(--text-muted);">暂无数据</div></div>
  </div>
  <div class="section-title">近期攻克记录</div>
  <div class="add-form"><div id="solved-list"></div></div>
</div>

<!-- 详情弹窗 -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal-sheet" id="modal-sheet">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">题目详情</div>
      <button class="modal-close" onclick="closeModal()" aria-label="关闭">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var STORAGE_KEY = 'wrong_questions_v2';
var questions = [];
var currentFilter = 'all';
var editingImageData = null;

/* ════════════════════ 数据层 ════════════════════ */
function loadData() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    questions = raw ? JSON.parse(raw) : [];
    if (!Array.isArray(questions)) questions = [];
  } catch(e) { questions = []; }
}

/* Bug#4 & Bug#8 修复：saveData 先保存，失败则回滚，返回是否成功 */
function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(questions));
    var el = document.getElementById('storage-warn');
    if (el) el.style.display = 'none';
    return true;
  } catch(e) {
    var el2 = document.getElementById('storage-warn');
    if (el2) el2.style.display = 'block';
    showToast('存储空间不足！请删除已攻克题目或减少图片');
    return false;
  }
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

/* ════════════════════ 导航 ════════════════════ */
function switchTab(tab) {
  var pages = document.querySelectorAll('.page');
  for (var i = 0; i < pages.length; i++) pages[i].classList.remove('active');
  var tabs = document.querySelectorAll('.nav-tab');
  for (var j = 0; j < tabs.length; j++) tabs[j].classList.remove('active');

  document.getElementById('page-' + tab).classList.add('active');
  var tabNames = ['list', 'add', 'stats'];
  var idx = tabNames.indexOf(tab);
  if (idx >= 0) tabs[idx].classList.add('active');

  if (tab === 'list') renderList();
  if (tab === 'stats') renderStats();
  window.scrollTo(0, 0);
}

/* ════════════════════ 图片处理 ════════════════════ */
function handleImage(e) {
  var file = e.target.files[0];
  if (!file) return;

  var reader = new FileReader();
  reader.onload = function(ev) {
    /* Bug#7修复：在 onload 回调内（读取完成后）才重置 input */
    e.target.value = '';

    var img = new Image();
    img.onload = function() {
      var maxSize = 1200;
      var w = img.width, h = img.height;
      if (w > maxSize || h > maxSize) {
        var ratio = Math.min(maxSize / w, maxSize / h);
        w = Math.round(w * ratio);
        h = Math.round(h * ratio);
      }
      var canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      editingImageData = canvas.toDataURL('image/jpeg', 0.75);
      showPreview(editingImageData);
    };
    img.onerror = function() { showToast('图片读取失败，请重试'); };
    img.src = ev.target.result;
  };
  reader.onerror = function() { showToast('文件读取失败，请重试'); };
  reader.readAsDataURL(file);
}

function showPreview(src) {
  document.getElementById('img-preview').src = src;
  document.getElementById('img-preview-wrap').style.display = 'block';
  document.getElementById('upload-area').style.display = 'none';
}

function removeImage() {
  editingImageData = null;
  document.getElementById('img-preview').src = '';
  document.getElementById('img-preview-wrap').style.display = 'none';
  document.getElementById('upload-area').style.display = '';
  /* 重置两个 file input，避免再次选同一文件不触发 change */
  var cam = document.getElementById('file-camera');
  var gal = document.getElementById('file-gallery');
  if (cam) cam.value = '';
  if (gal) gal.value = '';
}

/* ════════════════════ 保存错题 ════════════════════ */
function saveQuestion() {
  var subject = document.getElementById('input-subject').value;
  var desc = document.getElementById('input-desc').value.trim();
  var note = document.getElementById('input-note').value.trim();
  if (!desc && !editingImageData) { showToast('请填写题目描述或添加图片'); return; }

  var q = {
    id: genId(), subject: subject, desc: desc, note: note,
    image: editingImageData,
    correctCount: 0, removed: false,
    addedAt: Date.now(), history: []
  };

  /* Bug#4修复：先 unshift，失败时回滚 */
  questions.unshift(q);
  var ok = saveData();
  if (!ok) {
    questions.shift(); /* 回滚 */
    return;
  }

  showToast('错题已保存！');
  document.getElementById('input-desc').value = '';
  document.getElementById('input-note').value = '';
  removeImage();
  updateHeaderSub();
}

/* ════════════════════ 答题操作 ════════════════════ */
function markCorrect(id) {
  var q = findQ(id);
  if (!q || q.removed) return;
  q.correctCount++;
  q.history.push({ time: Date.now(), correct: true });
  if (q.correctCount >= 3) {
    q.mastered = true;
    showToast('太棒了！连续答对3次，已掌握 ✓');
  } else {
    showToast('答对了！还需再答对 ' + (3 - q.correctCount) + ' 次');
  }
  saveData();
  renderList();      /* Bug#5修复：无论在哪里调用都刷新列表 */
  updateHeaderSub();
}

function markWrong(id) {
  var q = findQ(id);
  if (!q || q.removed) return;
  q.correctCount = 0;
  q.mastered = false;
  q.history.push({ time: Date.now(), correct: false });
  showToast('没关系，继续加油！');
  saveData();
  renderList();      /* Bug#5修复 */
}

function deleteQuestion(id) {
  if (!confirm('确定要删除这道错题吗？')) return;
  questions = questions.filter(function(x) { return x.id !== id; });
  saveData(); renderList(); showToast('已删除');
}

function findQ(id) {
  for (var i = 0; i < questions.length; i++) {
    if (questions[i].id === id) return questions[i];
  }
  return null;
}

/* ════════════════════ 渲染列表 ════════════════════ */
function renderList() {
  updateFilterBar();
  var active = questions.filter(function(q) { return !q.removed; });
  var filtered = currentFilter === 'all' ? active : active.filter(function(q) { return q.subject === currentFilter; });
  var el = document.getElementById('wq-list');
  if (filtered.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📖</div><div class="empty-title">暂无错题</div><div class="empty-hint">' +
      (currentFilter === 'all' ? '点击"添加错题"开始记录' : '该科目暂无错题') + '</div></div>';
    return;
  }
  el.innerHTML = filtered.map(renderCard).join('');
}

/* Bug#1 & Bug#2 & Bug#3 修复：
   - 不在 onclick 里拼科目名（避免XSS/单引号截断）
   - 改用 data-id 属性 + 顶层事件委托，彻底规避内联 onclick 的转义问题
*/
function renderCard(q) {
  var dots = '';
  for (var i = 0; i < 3; i++) dots += '<span class="dot' + (i < q.correctCount ? ' filled' : '') + '"></span>';
  var sc = subjectColor(q.subject);
  var imgHtml = q.image ? '<div class="wq-img-wrap"><img class="wq-img" src="' + q.image + '" alt="题目图片" data-action="view" data-id="' + q.id + '"></div>' : '';
  var descHtml = q.desc ? '<div class="wq-desc">' + escHtml(q.desc) + '</div>' : '';
  var noteHtml = q.note ? '<div class="wq-note">📝 ' + escHtml(q.note) + '</div>' : '';
  return '<div class="wq-card' + (q.mastered ? ' mastered' : '') + '" data-card-id="' + q.id + '">' +
    '<div class="wq-card-header">' +
      '<span class="subject-badge" style="background:' + sc + '22;color:' + sc + ';border:1px solid ' + sc + '44;">' + escHtml(q.subject) + '</span>' +
      (q.mastered ? '<span class="mastered-badge">✓ 已掌握</span>' : '') +
      '<div class="correct-counter">' + dots + '<span style="font-size:11px;color:var(--text-muted);margin-left:2px;">' + q.correctCount + '/3</span></div>' +
      '<span class="wq-date">' + formatDate(q.addedAt) + '</span>' +
    '</div>' +
    '<div class="wq-card-body">' + descHtml + imgHtml + noteHtml + '</div>' +
    '<div class="wq-card-footer">' +
      '<button class="btn btn-success btn-sm" data-action="correct" data-id="' + q.id + '">✓ 答对了</button>' +
      '<button class="btn btn-sm" style="background:var(--danger-light);color:var(--danger);border-color:var(--danger);" data-action="wrong" data-id="' + q.id + '">✗ 答错了</button>' +
      '<button class="btn btn-sm" data-action="view" data-id="' + q.id + '" style="margin-left:auto;">查看</button>' +
      '<button class="btn btn-sm" style="color:var(--text-muted);" data-action="delete" data-id="' + q.id + '">删除</button>' +
    '</div>' +
  '</div>';
}

/* Bug#1/2/3 修复：用事件委托统一处理卡片按钮点击 */
document.getElementById('wq-list') && void(0); /* 先等 DOM ready 后绑定，见 init() */

function bindListEvents() {
  document.getElementById('wq-list').addEventListener('click', function(e) {
    var el = e.target;
    /* 向上找有 data-action 的元素（图片点击也能冒泡到这里）*/
    while (el && el !== this) {
      if (el.dataset && el.dataset.action) break;
      el = el.parentElement;
    }
    if (!el || !el.dataset || !el.dataset.action) return;
    var action = el.dataset.action;
    var id = el.dataset.id;
    if (action === 'correct') markCorrect(id);
    else if (action === 'wrong') markWrong(id);
    else if (action === 'view') viewDetail(id);
    else if (action === 'delete') deleteQuestion(id);
  });
}

/* Bug#1/2/3 修复：科目筛选同样用事件委托 */
function bindFilterEvents() {
  document.getElementById('filter-bar').addEventListener('click', function(e) {
    var btn = e.target;
    if (!btn.classList.contains('filter-chip')) return;
    var subject = btn.dataset.subject;
    currentFilter = subject;
    var chips = document.querySelectorAll('.filter-chip');
    for (var i = 0; i < chips.length; i++) chips[i].classList.remove('active');
    btn.classList.add('active');
    renderList();
  });
}

function updateFilterBar() {
  var seenSubjects = [];
  var seen = {};
  for (var i = 0; i < questions.length; i++) {
    var q = questions[i];
    if (!q.removed && !seen[q.subject]) { seen[q.subject] = true; seenSubjects.push(q.subject); }
  }
  /* 如果当前筛选的科目已无题目，重置为全部 */
  if (currentFilter !== 'all' && seenSubjects.indexOf(currentFilter) === -1) currentFilter = 'all';

  var html = '<button class="filter-chip' + (currentFilter === 'all' ? ' active' : '') + '" data-subject="all">全部</button>';
  for (var j = 0; j < seenSubjects.length; j++) {
    var s = seenSubjects[j];
    html += '<button class="filter-chip' + (currentFilter === s ? ' active' : '') + '" data-subject="' + escAttr(s) + '">' + escHtml(s) + '</button>';
  }
  document.getElementById('filter-bar').innerHTML = html;
}

/* ════════════════════ 统计 ════════════════════ */
function renderStats() {
  var total = questions.length;
  var solved = questions.filter(function(q) { return q.removed || q.mastered; }).length;
  var active = total - solved;
  var rate = total > 0 ? Math.round(solved / total * 100) : 0;
  document.getElementById('stat-active').textContent = active;
  document.getElementById('stat-solved').textContent = solved;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-rate').textContent = rate + '%';

  var subjectMap = {};
  questions.forEach(function(q) {
    if (!subjectMap[q.subject]) subjectMap[q.subject] = { total: 0, solved: 0 };
    subjectMap[q.subject].total++;
    if (q.removed || q.mastered) subjectMap[q.subject].solved++;
  });
  var chartEl = document.getElementById('subject-chart');
  var subjects = Object.keys(subjectMap);
  if (subjects.length === 0) {
    chartEl.innerHTML = '<div style="text-align:center;padding:20px 0;font-size:13px;color:var(--text-muted);">暂无数据</div>';
  } else {
    var maxTotal = 1;
    subjects.forEach(function(s) { if (subjectMap[s].total > maxTotal) maxTotal = subjectMap[s].total; });
    chartEl.innerHTML = subjects.map(function(s) {
      var d = subjectMap[s];
      var pct = Math.round(d.total / maxTotal * 100);
      var solvedStr = d.solved > 0 ? ' <span style="color:var(--success)">✓' + d.solved + '</span>' : '';
      return '<div class="chart-row">' +
        '<div class="chart-label" title="' + escAttr(s) + '">' + escHtml(s) + '</div>' +
        '<div class="chart-bar-bg"><div class="chart-bar-fill" style="width:' + pct + '%"></div></div>' +
        '<div class="chart-pct">' + d.total + '题' + solvedStr + '</div>' +
      '</div>';
    }).join('');
  }

  var solvedItems = questions.filter(function(q) { return q.removed || q.mastered; });
  solvedItems.sort(function(a, b) { return (b.solvedAt || 0) - (a.solvedAt || 0); });
  solvedItems = solvedItems.slice(0, 10);
  var solvedEl = document.getElementById('solved-list');
  if (solvedItems.length === 0) {
    solvedEl.innerHTML = '<div style="text-align:center;padding:20px 0;font-size:13px;color:var(--text-muted);">暂无攻克记录，继续加油！</div>';
  } else {
    solvedEl.innerHTML = solvedItems.map(function(q) {
      return '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);">' +
        '<span style="font-size:16px;">🏆</span>' +
        '<div style="flex:1;min-width:0;">' +
          '<div style="font-size:12px;font-weight:500;color:var(--success);">' + escHtml(q.subject) + '</div>' +
          '<div style="font-size:12px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + (q.desc ? escHtml(q.desc) : '（图片题）') + '</div>' +
        '</div>' +
        '<div style="font-size:11px;color:var(--text-muted);white-space:nowrap;">' + (q.solvedAt ? formatDate(q.solvedAt) : '') + '</div>' +
      '</div>';
    }).join('');
  }
}

/* ════════════════════ 详情弹窗 ════════════════════ */
function viewDetail(id) {
  var q = findQ(id);
  if (!q) return;

  document.getElementById('modal-title').textContent = q.subject + ' · ' + formatDate(q.addedAt);

  var histHtml = '';
  if (q.history && q.history.length > 0) {
    var recent = q.history.slice(-8).reverse();
    histHtml = '<div style="margin-top:14px;"><div class="section-title" style="margin-bottom:6px;">练习记录</div>' +
      recent.map(function(h) {
        return '<div style="font-size:12px;color:' + (h.correct ? 'var(--success)' : 'var(--danger)') + ';padding:3px 0;">' +
          (h.correct ? '✓ 答对' : '✗ 答错') + ' · ' + formatDate(h.time) + '</div>';
      }).join('') + '</div>';
  }

  /* Bug#5修复：弹窗内按钮用 data-action + 事件委托 */
  var actionHtml = '';
  if (q.mastered) {
    actionHtml = '<div class="removed-banner" style="background:var(--success-light);color:var(--success);">✓ 已掌握 · 连续答对 ' + q.correctCount + ' 次</div>';
  } else if (!q.removed) {
    actionHtml = '<div style="display:flex;gap:8px;margin-top:16px;">' +
      '<button class="btn btn-success" style="flex:1;padding:12px;" data-modal-action="correct" data-id="' + q.id + '">✓ 答对了</button>' +
      '<button class="btn" style="flex:1;padding:12px;background:var(--danger-light);color:var(--danger);border-color:var(--danger);" data-modal-action="wrong" data-id="' + q.id + '">✗ 答错了</button>' +
    '</div>';
  } else {
    actionHtml = '<div class="removed-banner">已攻克 🎉</div>';
  }

  document.getElementById('modal-body').innerHTML =
    (q.image ? '<img src="' + q.image + '" style="width:100%;border-radius:10px;margin-bottom:12px;max-height:300px;object-fit:contain;background:#f8f8f8;" alt="题目图片">' : '') +
    (q.desc ? '<div style="font-size:14px;line-height:1.6;margin-bottom:10px;word-break:break-word;">' + escHtml(q.desc) + '</div>' : '') +
    (q.note ? '<div style="font-size:13px;color:var(--text-muted);background:var(--warning-light);padding:10px;border-radius:8px;margin-bottom:10px;word-break:break-word;">📝 ' + escHtml(q.note) + '</div>' : '') +
    '<div style="font-size:12px;color:var(--text-muted);">连续答对进度：' + q.correctCount + '/3 次</div>' +
    histHtml + actionHtml;

  document.getElementById('detail-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('detail-modal').classList.remove('open');
  document.body.style.overflow = '';
}

/* ════════════════════ Toast ════════════════════ */
var toastTimer = null;
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.classList.remove('show'); }, 2500);
}

/* ════════════════════ 工具函数 ════════════════════ */
function subjectColor(s) {
  var map = {语文:'#D85A30',数学:'#534AB7',英语:'#1D9E75',物理:'#185FA5',化学:'#BA7517',生物:'#639922',历史:'#D4537E',地理:'#0F6E56',政治:'#888780',其他:'#888780'};
  return map[s] || '#534AB7';
}

function formatDate(ts) {
  if (!ts) return '';
  var d = new Date(ts), now = new Date();
  var diff = (now - d) / 1000;
  if (diff < 60) return '刚刚';
  if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
  if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
  var days = Math.floor(diff / 86400);
  if (days <= 7) return days + '天前';
  return (d.getMonth() + 1) + '/' + d.getDate();
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/\n/g, '<br>');
}

/* Bug#1修复：属性值转义（用于 data-subject 等属性） */
function escAttr(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function updateHeaderSub() {
  var active = questions.filter(function(q) { return !q.removed; }).length;
  var solved = questions.filter(function(q) { return q.removed || q.mastered; }).length;
  var el = document.getElementById('header-sub');
  if (active === 0 && solved === 0) el.textContent = '加油，攻克每一道难题！';
  else if (active === 0) el.textContent = '太厉害了！所有 ' + solved + ' 道题都已攻克 🎉';
  else el.textContent = '还剩 ' + active + ' 道题待攻克，已攻克 ' + solved + ' 道';
}

function fixHeaderHeight() {
  var h = document.getElementById('app-header').offsetHeight;
  document.documentElement.style.setProperty('--header-h', h + 'px');
}

/* ════════════════════ 初始化 ════════════════════ */
function init() {
  loadData();
  bindListEvents();
  bindFilterEvents();

  /* PWA自修复：保存当前访问地址，帮助用户重新安装 */
  var origin = window.location.origin;
  try { localStorage.setItem('pwa_last_origin', origin); } catch(e) {}
  var urlBar = document.getElementById('pwa-url-bar');
  if (urlBar) {
    urlBar.style.display = 'block';
    document.getElementById('pwa-url-text').textContent = origin + '/wrong-questions-app.html';
  }

  /* Bug#5修复：弹窗内的答题按钮统一走事件委托 */
  document.getElementById('modal-body').addEventListener('click', function(e) {
    var el = e.target;
    while (el && el !== this) {
      if (el.dataset && el.dataset.modalAction) break;
      el = el.parentElement;
    }
    if (!el || !el.dataset || !el.dataset.modalAction) return;
    var action = el.dataset.modalAction;
    var id = el.dataset.id;
    if (action === 'correct') { markCorrect(id); closeModal(); }
    else if (action === 'wrong') { markWrong(id); closeModal(); }
  });

  /* 点击弹窗遮罩关闭 */
  document.getElementById('detail-modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  renderList();
  updateHeaderSub();
  fixHeaderHeight();
  window.addEventListener('resize', fixHeaderHeight);
}

init();

/* 注册 Service Worker（PWA 离线支持） */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js')
    .then(function(reg) { console.log('SW registered'); })
    .catch(function(err) { console.log('SW registration failed:', err); });
}
</script>
